name: Update Casks
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-apps:
    runs-on: macos-latest
    strategy:
      matrix:
        # Add more apps here easily in the future!
        include:
          - name: shiru
            repo: RockinChaos/Shiru
            file: Casks/shiru.rb
            url_pattern: "v${VERSION}/mac-Shiru-v${VERSION}.dmg"
          - name: mangayomi
            repo: kodjodevf/mangayomi
            file: Casks/mangayomi.rb
            url_pattern: "v${VERSION}/Mangayomi-v${VERSION}-macos.dmg"

    steps:
      - name: Checkout Tap
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.HOMEBREW_BUMP_TOKEN }}

      - name: Check for ${{ matrix.name }} Version
        id: check
        run: |
          LATEST_VERSION=$(curl -s -H "Authorization: token ${{ secrets.HOMEBREW_BUMP_TOKEN }}" \
            https://api.github.com/repos/${{ matrix.repo }}/releases/latest | jq -r '.tag_name' | sed 's/v//')

          CURRENT_VERSION=$(grep 'version "' ${{ matrix.file }} | head -n 1 | cut -d '"' -f 2)

          echo "Latest: $LATEST_VERSION | Current: $CURRENT_VERSION"

          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ] && [ "$LATEST_VERSION" != "null" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update ${{ matrix.name }}
        if: steps.check.outputs.update_needed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          # Construct the URL based on the matrix pattern
          URL="https://github.com/${{ matrix.repo }}/releases/download/${{ matrix.url_pattern }}"

          NEW_SHA=$(curl -L -s "$URL" | shasum -a 256 | awk '{print $1}')

          sed -i '' "s/version \".*\"/version \"$VERSION\"/" ${{ matrix.file }}
          sed -i '' "s/sha256 \".*\"/sha256 \"$NEW_SHA\"/" ${{ matrix.file }}

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add ${{ matrix.file }}
          git commit -m "Update ${{ matrix.name }} to v$VERSION"
          git push origin master
