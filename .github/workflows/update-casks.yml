name: Update Casks
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-apps:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: librewolf
            api_url: "https://codeberg.org/api/v1/repos/librewolf/bsys6/releases/latest"
            file: Casks/librewolf.rb
            url_template: "https://codeberg.org/api/packages/librewolf/generic/librewolf/VERSION/librewolf-VERSION-macos-arm64-package.dmg"
          
          - name: shiru
            api_url: "https://api.github.com/repos/RockinChaos/Shiru/releases/latest"
            file: Casks/shiru.rb
            url_template: "https://github.com/RockinChaos/Shiru/releases/download/vVERSION/mac-Shiru-vVERSION.dmg"

          - name: mangayomi
            api_url: "https://api.github.com/repos/kodjodevf/mangayomi/releases/latest"
            file: Casks/mangayomi.rb
            url_template: "https://github.com/kodjodevf/mangayomi/releases/download/vVERSION/Mangayomi-vVERSION-macos.dmg"

          - name: openmessage
            api_url: "https://api.github.com/repos/MaxGhenis/openmessage/releases/latest"
            file: Casks/openmessage.rb
            url_template: "https://github.com/MaxGhenis/openmessage/releases/download/vVERSION/OpenMessage.dmg"

    steps:
      - name: Checkout Tap
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.HOMEBREW_BUMP_TOKEN }}

      - name: Check Version
        id: check
        run: |
          # Detect if we need GitHub Token or no auth (Codeberg)
          if [[ "${{ matrix.api_url }}" == *"github.com"* ]]; then
            RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.HOMEBREW_BUMP_TOKEN }}" ${{ matrix.api_url }})
          else
            RESPONSE=$(curl -s ${{ matrix.api_url }})
          fi

          LATEST_VERSION=$(echo "$RESPONSE" | jq -r '.tag_name' | sed 's/v//')
          CURRENT_VERSION=$(grep 'version "' ${{ matrix.file }} | head -n 1 | cut -d '"' -f 2)

          if [ "$LATEST_VERSION" != "null" ] && [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update and Push
        if: steps.check.outputs.update_needed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          # Replace 'VERSION' in the template with the actual version number
          URL=$(echo "${{ matrix.url_template }}" | sed "s/VERSION/$VERSION/g")

          echo "Updating ${{ matrix.name }} to v$VERSION..."

          # 1. Download and calculate SHA256
          NEW_SHA=$(curl -L -s "$URL" | shasum -a 256 | awk '{print $1}')

          if [ -z "$NEW_SHA" ] || [ "$NEW_SHA" == "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
            echo "Error: Download failed or file is empty."
            exit 1
          fi

          # 2. Update the file
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" ${{ matrix.file }}
          sed -i '' "s/sha256 \".*\"/sha256 \"$NEW_SHA\"/" ${{ matrix.file }}

          # 3. Commit and Push ONLY if changes were made
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add ${{ matrix.file }}

          # Check if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes detected for ${{ matrix.name }}. Skipping commit."
          else
            echo "Changes detected. Committing..."
            git commit -m "Update ${{ matrix.name }} to v$VERSION"
            git push origin master
          fi
