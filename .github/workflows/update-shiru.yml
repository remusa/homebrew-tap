name: Update Shiru Cask
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  homebrew-bump:
    runs-on: macos-latest
    steps:
      - name: Checkout Tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew update
          # Ensure the tap is linked locally in the runner
          brew tap remusa/tap .

      - name: Bump Cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_BUMP_TOKEN }}
        run: |
          # 1. Force Homebrew to recognize the local Cask file
          # We point directly to the file to ensure livecheck finds it
          LATEST_VERSION=$(brew livecheck --json --quiet Casks/shiru.rb | jq -r '.[0].livecheck.version.latest')

          echo "Latest version found: $LATEST_VERSION"

          # Check if we actually got a version string
          if [ "$LATEST_VERSION" == "null" ] || [ -z "$LATEST_VERSION" ]; then
            echo "Error: Could not determine latest version."
            exit 1
          fi

          # 2. Run the bump
          # Removed --online and added --no-audit
          brew bump-cask-pr \
            --version="$LATEST_VERSION" \
            --no-audit \
            --no-style \
            --force \
            Casks/shiru.rb
