name: Update Shiru Cask
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  homebrew-bump:
    runs-on: macos-latest
    steps:
      - name: Checkout Tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew update
          # Ensure the tap is linked locally in the runner
          brew tap remusa/tap .

      - name: Bump Cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_BUMP_TOKEN }}
        run: |
          # 1. Get the latest version by pointing directly to the file
          # We use --full-name to help livecheck identify the cask context
          LATEST_VERSION=$(brew livecheck --json --quiet ./Casks/shiru.rb | jq -r '.[0].livecheck.version.latest')

          echo "Latest version found: $LATEST_VERSION"

          # 2. Safety check
          if [ "$LATEST_VERSION" == "null" ] || [ -z "$LATEST_VERSION" ]; then
            echo "Error: Could not determine latest version. Ensure 'livecheck' block exists in Casks/shiru.rb"
            exit 1
          fi

          # 3. Run the bump using the file path
          # We use --version to specify the target and point to the file
          brew bump-cask-pr \
            --version="$LATEST_VERSION" \
            --no-audit \
            --no-style \
            --force \
            ./Casks/shiru.rb
