name: Update Shiru Cask
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  homebrew-bump:
    runs-on: macos-latest
    steps:
      - name: Checkout Tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew update
          # Ensure the tap is linked locally in the runner
          brew tap remusa/tap .

      - name: Bump Cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_BUMP_TOKEN }}
        run: |
          # 1. Register the current directory as your tap
          # This is the "magic link" Homebrew needs
          brew tap remusa/tap .

          # 2. Get the latest version
          # Now we can refer to it by its short name because it's properly tapped
          LATEST_VERSION=$(brew livecheck remusa/tap/shiru --json --quiet | jq -r '.[0].livecheck.version.latest')

          echo "Latest version found: $LATEST_VERSION"

          # Safety check
          if [ "$LATEST_VERSION" == "null" ] || [ -z "$LATEST_VERSION" ]; then
            echo "Error: Could not determine latest version. Check the livecheck block in shiru.rb."
            exit 1
          fi

          # 3. Run the bump
          # Using the full tap name ensures the script knows where to save the changes
          brew bump-cask-pr \
            --version="$LATEST_VERSION" \
            --no-audit \
            --no-style \
            --force \
            remusa/tap/shiru
