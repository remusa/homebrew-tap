name: Update Shiru Cask
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  homebrew-bump:
    runs-on: macos-latest
    steps:
      # FIX: Ensure Homebrew is ready and has its developer dependencies
      - name: Set up Homebrew
        run: |
          brew update
          brew install-bundler-gems

      - name: Update Shiru Cask
        uses: macauley/action-homebrew-bump-cask@v1
        with:
          token: ${{ secrets.HOMEBREW_BUMP_TOKEN }}
          cask: shiru
          tap: remusa/tap
          livecheck: true
          force: true
