name: Update Shiru Cask
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  homebrew-bump:
    runs-on: macos-latest
    steps:
      - name: Checkout Tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew update
          # Ensure the tap is linked locally in the runner
          brew tap remusa/tap .

      - name: Bump Cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_BUMP_TOKEN }}
        run: |
          # 1. Get the latest version using livecheck
          LATEST_VERSION=$(brew livecheck shiru --json | jq -r '.[0].livecheck.version.latest')
          echo "Latest version found: $LATEST_VERSION"

          # 2. Use the built-in bump command
          # --force tells it to commit directly if everything looks good
          # --no-audit skips strict formatting checks to speed things up
          brew bump-cask-pr \
            --version="$LATEST_VERSION" \
            --no-audit \
            --online \
            --force \
            shiru
