name: Update Shiru Cask
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  homebrew-bump:
    runs-on: macos-latest
    steps:
      - name: Checkout Tap
        uses: actions/checkout@v4

      - name: Manual Tap Link
        run: |
          # Create the path where Homebrew expects taps to live
          TAPS_DIR=$(brew --repository)/Library/Taps/remusa
          mkdir -p "$TAPS_DIR"

          # Symlink your current workspace into that directory
          ln -s "$GITHUB_WORKSPACE" "$TAPS_DIR/homebrew-tap"

          # Verify Homebrew sees it
          brew tap

      - name: Bump Cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_BUMP_TOKEN }}
        run: |
          # 1. Get the latest version using the formal tap name
          LATEST_VERSION=$(brew livecheck remusa/tap/shiru --json --quiet | jq -r '.[0].livecheck.version.latest')

          echo "Latest version found: $LATEST_VERSION"

          # 2. Safety check
          if [ "$LATEST_VERSION" == "null" ] || [ -z "$LATEST_VERSION" ]; then
            echo "Error: Could not determine latest version."
            exit 1
          fi

          # 3. Run the bump
          # We use the full name so Homebrew knows exactly which repo to commit to
          brew bump-cask-pr \
            --version="$LATEST_VERSION" \
            --no-audit \
            --no-style \
            --force \
            remusa/tap/shiru
